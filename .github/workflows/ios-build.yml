name: Build iOS IPA
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Export Static Next.js
        run: npm run build

      - name: Force Web Assets Entry Point
        run: |
          mkdir -p out
          if [ ! -f "out/index.html" ]; then
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Compass Finance</title></head><body><div id="__next">Loading...</div></body></html>' > out/index.html
          fi

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Build Xcode Project (Unsigned IPA)
        run: |
          # Cari lokasi folder yang berisi App.xcworkspace secara presisi
          WORKSPACE_PATH=$(find . -name "App.xcworkspace" -not -path "*/node_modules/*" | head -n 1)
          TARGET_DIR=$(dirname "$WORKSPACE_PATH")

          echo "=== BERPINDAH KE DIREKTORI XCODE ==="
          echo "Target direktori: $TARGET_DIR"
          cd "$TARGET_DIR"

          echo "=== MEMULAI KOMPILASI XCODEBUILD ==="
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release -allowProvisioningUpdates ARCHS="arm64" CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean archive -archivePath build/App.xcarchive

          echo "=== MEMBUNGKUS MENJADI IPA ==="
          mkdir -p build/Payload
          cp -R build/App.xcarchive/Products/Applications/App.app build/Payload/
          cd build && zip -r CompassFinance.ipa Payload/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Compass-Finance-iOS-IPA
          path: "**/build/CompassFinance.ipa"
