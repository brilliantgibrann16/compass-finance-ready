name: iOS Build (Unsigned IPA)

# Compiles the Capacitor-wrapped Compass Finance web app into an unsigned
# development .ipa entirely on GitHub's macOS runners — no local Mac required.
on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  build-ios:
    name: Build unsigned Compass Finance .ipa
    runs-on: macos-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Capacitor's SPM package (ios/App/CapApp-SPM) references the @capacitor/*
      # packages in node_modules via local file paths, so deps MUST exist before
      # xcodebuild runs the archive.
      - name: Install dependencies
        run: npm ci || npm install

      # Next.js static export. output:'export' is gated behind MOBILE_EXPORT in
      # next.config.js. The POST /api/sync route handler is incompatible with
      # static export, so move it aside for this build and restore it after.
      - name: Build static web bundle (Next.js export)
        env:
          MOBILE_EXPORT: 'true'
        run: |
          if [ -d app/api ]; then
            mv app/api "${RUNNER_TEMP}/compass-api-backup"
            echo "moved app/api aside for static export"
          fi
          set +e
          npm run build
          BUILD_CODE=$?
          set -e
          if [ -d "${RUNNER_TEMP}/compass-api-backup" ]; then
            mv "${RUNNER_TEMP}/compass-api-backup" app/api
            echo "restored app/api"
          fi
          test $BUILD_CODE -eq 0
          test -f out/index.html

      - name: Sync web assets into the iOS project
        run: npx --yes cap sync ios

      - name: List Xcode schemes (diagnostic)
        run: xcodebuild -list -project ios/App/App.xcodeproj

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      # Unsigned archive. We disable code signing entirely; this produces an
      # .app that is NOT installable on a device without resigning, but is a
      # valid build artifact for inspection / downstream signing.
      - name: Archive (unsigned) with xcodebuild
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "${RUNNER_TEMP}/App.xcarchive" \
            clean archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      # Unsigned IPAs cannot be produced by -exportArchive (it requires signing),
      # so package the .app manually into the canonical Payload/ structure.
      - name: Package unsigned .ipa
        run: |
          APP_PATH="${RUNNER_TEMP}/App.xcarchive/Products/Applications/App.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::App.app not found at $APP_PATH"; exit 1
          fi
          rm -rf "${RUNNER_TEMP}/Payload"
          mkdir -p "${RUNNER_TEMP}/Payload"
          cp -R "$APP_PATH" "${RUNNER_TEMP}/Payload/"
          ( cd "${RUNNER_TEMP}" && zip -qry "Compass Finance.ipa" Payload )
          ls -lh "${RUNNER_TEMP}/Compass Finance.ipa"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: compass-finance-unsigned-ipa
          path: ${{ runner.temp }}/Compass Finance.ipa
          if-no-files-found: error
          retention-days: 14
