name: Test

# Jalankan workflow setiap kali ada push atau pull request ke branch `main`.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Batalkan run lama untuk ref yang sama saat ada push baru,
# supaya CI tidak antri menumpuk pada PR yang sering di-update.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Vitest (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # Aktifkan built-in cache untuk npm berdasarkan package-lock.json.
          # Sesuai aturan .clinerules §4: package manager = npm.
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        # `npm ci` lebih cepat & reproducible di CI (butuh package-lock.json).
        run: npm ci

      - name: Run Vitest with coverage (v8)
        # Script ini terdefinisi di package.json: "vitest run --coverage".
        # Provider coverage default Vitest = 'v8' (paket @vitest/coverage-v8).
        run: npm run test:coverage

      - name: Upload coverage report
        # Selalu upload meskipun test gagal, untuk debugging.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14
